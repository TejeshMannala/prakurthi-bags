# =============================================================================
# Production deployment for Prakurthi Bags (MERN) on Render.
#
# Topology: SINGLE web service that builds AND serves BOTH the customer
# frontend and the admin dashboard from the same Express origin.
# https://prakurthi-bags.onrender.com
#
# This eliminates cross-origin CORS and "/api/api" duplication because the
# browser talks to its own origin for both static assets and /api/* routes.
#
# If you prefer separate static sites instead, set REACT_APP_API_URL and
# VITE_API_URL to the backend origin and use Render's Static Site type.
# The code already supports both via window.location.origin.
# =============================================================================

services:
  - type: web
    name: prakurthi-bags
    env: node
    plan: free
    # Build the frontend and admin so Express can serve them.
    # We use absolute paths ($RENDER_PROJECT_ROOT is the repo root) so
    # directory navigation never fails on Render's build environment.
    buildCommand: |
      npm --prefix backend install
      npm --prefix frontend install
      npm --prefix frontend run build
      npm --prefix admin-dashboard install
      npm --prefix admin-dashboard run build
    startCommand: node backend/server.js
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: FRONTEND_URL
        value: https://prakurthi-bags.onrender.com
      - key: ADMIN_URL
        value: https://prakurthi-bags.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # IMPORTANT: keep REACT_APP_API_URL and VITE_API_URL UNSET so the
      # builds fall back to window.location.origin (same origin, no /api dup).
      # SMTP Email (forgot-password / OTP). Set via Render dashboard.
      # - key: SMTP_HOST
      #   value: smtp.gmail.com
      # - key: SMTP_PORT
      #   value: 465
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
