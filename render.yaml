services:
  # Backend API Service
  - type: web
    name: prakurthi-bags
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: FRONTEND_URL
        value: https://prakurthi-bags-1-frontend.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  # Frontend Static Site
  - type: static_site
    name: prakurthi-bags-1-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    autoDeploy: true
    routes:
      - type: rewrite
        source: /**
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://prakurthi-bags.onrender.com
      - key: REACT_APP_GOOGLE_CLIENT_ID
        value: 1052060626452-mb43897e734pq77kjsmthk10gi49ddsu.apps.googleusercontent.com

  # Admin Dashboard Static Site
  - type: static_site
    name: prakurthi-bags-admin
    env: static
    buildCommand: cd admin-dashboard && npm install && npm run build
    staticPublishPath: admin-dashboard/dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /admin/**
        destination: /admin/index.html
    envVars:
      - key: VITE_API_URL
        value: https://prakurthi-bags.onrender.com
