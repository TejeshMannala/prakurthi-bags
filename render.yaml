# =============================================================================
# Production deployment for Prakurthi Bags (MERN) on Render.
#
# Topology: This YAML configures the BACKEND API service ONLY.
# The frontend is deployed separately as a Static Site.
#
# Frontend static site (Render):
#   Build: npm install && npm run build
#   Publish: build
#
# Backend API (this service):
#   Build: npm install
#   Start: npm start
# =============================================================================

services:
  - type: web
    name: prakurthi-bags
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: FRONTEND_URL
        value: https://prakruthi-bags-frontend.onrender.com
      - key: ADMIN_URL
        value: https://prakurthi-bags.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_LOGIN_ENABLED
        value: 'true'
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_SECURE
        value: 'false'
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Administrator
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_TOKEN
        sync: false
