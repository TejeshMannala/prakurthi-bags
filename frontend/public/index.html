<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1B5E20" />
    <!-- Apply persisted theme BEFORE React paints to prevent any flash /
         flicker on refresh. Defaults to light; a future toggle can write
         `localStorage.theme` and this just re-applies it. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="description" content="Prakruthi Bags — Carry Nature. Carry the Future. Reusable, handcrafted jute & cotton bags that replace single-use plastic and protect the planet. Shop eco-friendly bags for school, college, office, travel & gifting." />
    <meta name="keywords" content="eco friendly bags, jute bags, cotton bags, reusable bags, sustainable shopping, plastic free, Prakruthi Bags, biodegradable bags, handmade bags" />
    <meta property="og:title" content="Prakruthi Bags — Carry Nature. Carry the Future." />
    <meta property="og:description" content="Switch to reusable jute & cotton bags. Together we have replaced 125,000+ plastic bags. Shop premium eco-friendly bags." />
    <meta property="og:image" content="%PUBLIC_URL%/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://accounts.google.com" crossorigin />
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <link rel="dns-prefetch" href="https://ssl.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>Prakruthi Bags | Carry Nature. Carry the Future.</title>
    <style>
      /* ---- Global resets ---- */
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      /* ---- Consistent branded background on EVERY layer to prevent
            white/black flash on any browser/platform ---- */
      html, body, #root {
        min-height: 100vh;
        background: #F8F5EE;
        color: #1f2a22;
      }
      body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
      img.hover-scale:hover { transform: scale(1.05); }

      /* ---- #root takes full viewport while React loads ---- */
      #root {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      #root:empty {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* ============================================================
         Branded App Loader — shown BEFORE React mounts.
         Identical markup is rendered by the React <AppLoader> component
         so the transition from HTML loader -> React is seamless.
         ============================================================ */
      .app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F8F5EE;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      .app-loader.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .app-loader__logo-wrap {
        position: relative;
        width: 88px;
        height: 88px;
        margin-bottom: 24px;
      }
      .app-loader__logo {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        object-fit: cover;
        box-shadow: 0 8px 32px rgba(46, 90, 68, 0.18);
        animation: appLoaderPulse 2s ease-in-out infinite;
      }
      .app-loader__ring {
        position: absolute;
        inset: -6px;
        border: 3px solid transparent;
        border-top-color: #2E5A44;
        border-right-color: #81C784;
        border-radius: 50%;
        animation: appLoaderSpin 1.2s linear infinite;
      }
      .app-loader__brand {
        font-family: 'Playfair Display', serif;
        font-size: 22px;
        font-weight: 700;
        color: #1B5E20;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      .app-loader__tagline {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: #9ca3af;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 32px;
      }
      .app-loader__dots {
        display: flex;
        gap: 8px;
      }
      .app-loader__dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2E5A44;
        animation: appLoaderBounce 1.4s ease-in-out infinite;
      }
      .app-loader__dot:nth-child(2) { animation-delay: 0.16s; }
      .app-loader__dot:nth-child(3) { animation-delay: 0.32s; }

      @keyframes appLoaderSpin { to { transform: rotate(360deg); } }
      @keyframes appLoaderPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(46,90,68,0.18); }
        50% { transform: scale(1.03); box-shadow: 0 12px 40px rgba(46,90,68,0.28); }
      }
      @keyframes appLoaderBounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* ---- Fallback if logo fails to load ---- */
      .app-loader__logo-fallback {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #81C784 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: 'Playfair Display', serif;
        font-size: 36px;
        font-weight: 800;
        box-shadow: 0 8px 32px rgba(46, 90, 68, 0.18);
        animation: appLoaderPulse 2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!--
        Branded loading screen shown while JS bundles download & parse.
        React's createRoot().render() replaces this DOM instantly.
        The CSS class names match <AppLoader> so the transition is seamless.
      -->
      <div class="app-loader" id="app-initial-loader">
        <div class="app-loader__logo-wrap">
          <img
            class="app-loader__logo"
            src="%PUBLIC_URL%/icon-192.png"
            alt="Prakruthi Bags"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          />
          <div class="app-loader__logo-fallback" style="display:none">P</div>
          <div class="app-loader__ring"></div>
        </div>
        <div class="app-loader__brand">Prakruthi Bags</div>
        <div class="app-loader__tagline">Carry Nature. Carry the Future.</div>
        <div class="app-loader__dots">
          <div class="app-loader__dot"></div>
          <div class="app-loader__dot"></div>
          <div class="app-loader__dot"></div>
        </div>
      </div>
    </div>
  </body>
</html>
