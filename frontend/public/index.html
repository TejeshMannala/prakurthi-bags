<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1B5E20" />
    <!-- Apply persisted theme BEFORE React paints to prevent any flash /
         flicker on refresh. Defaults to light; a future toggle can write
         `localStorage.theme` and this just re-applies it. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="description" content="Prakruthi Bags — Carry Nature. Carry the Future. Reusable, handcrafted jute & cotton bags that replace single-use plastic and protect the planet. Shop eco-friendly bags for school, college, office, travel & gifting." />
    <meta name="keywords" content="eco friendly bags, jute bags, cotton bags, reusable bags, sustainable shopping, plastic free, Prakruthi Bags, biodegradable bags, handmade bags" />
    <meta property="og:title" content="Prakruthi Bags — Carry Nature. Carry the Future." />
    <meta property="og:description" content="Switch to reusable jute & cotton bags. Together we have replaced 125,000+ plastic bags. Shop premium eco-friendly bags." />
    <meta property="og:image" content="%PUBLIC_URL%/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://accounts.google.com" crossorigin />
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <link rel="dns-prefetch" href="https://ssl.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>Prakruthi Bags | Carry Nature. Carry the Future.</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Inter', sans-serif; background: #F8F5EE; color: #1f2a22; }
      img.hover-scale:hover { transform: scale(1.05); }
      /* Prevent white/black flash: #root has same bg as body and fills viewport */
      html, body, #root { min-height: 100vh; background: #F8F5EE; }
      #root:empty { display: flex; justify-content: center; align-items: center; }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;justify-content:center;align-items:center;min-height:100vh;background:#F8F5EE">
        <div style="text-align:center">
          <div style="width:44px;height:44px;border:4px solid #e5e7eb;border-top-color:#2E5A44;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px"></div>
          <p style="color:#6b7280;font-family:'Inter',sans-serif;font-size:13px;font-weight:500">Loading Prakruthi...</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
  </body>
</html>
